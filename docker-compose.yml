version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: briefing
      POSTGRES_PASSWORD: briefing
      POSTGRES_DB: briefing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U briefing -d briefing"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"

volumes:
  postgres_data:
